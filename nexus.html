<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERT Nexus · Recursos Humanos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
svg{width:16px;height:16px;flex-shrink:0;display:inline-block;vertical-align:middle}
button svg,.nav svg,.iconbtn svg,.cmdk svg,.mb-menu svg{flex-shrink:0}
:root{
  color-scheme:light;
  --bg:#FBFBFD; --surface:#FFFFFF; --surface-2:#F5F5F7; --surface-3:#ECECEE;
  --border:rgba(0,0,0,.07); --border-2:rgba(0,0,0,.11);
  --text-1:#1D1D1F; --text-2:#6E6E73; --text-3:#A1A1A6;
  --accent:#5856D6; --accent-tint:rgba(88,86,214,.09); --accent-tint-2:rgba(88,86,214,.15);
  --blue:#0066FF; --blue-tint:rgba(0,102,255,.09);
  --ok:#2FB344; --ok-tint:rgba(47,179,68,.10);
  --warn:#FF8A00; --warn-tint:rgba(255,138,0,.10);
  --danger:#FF3B30; --danger-tint:rgba(255,59,48,.09);
  --purple:#AF52DE; --purple-tint:rgba(175,82,222,.10);
  --teal:#30B0C7; --teal-tint:rgba(48,176,199,.10);
  --radius-l:22px; --radius-m:16px; --radius-s:11px;
  --shadow-1:0 1px 2px rgba(0,0,0,.04),0 1px 1px rgba(0,0,0,.03);
  --shadow-2:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --shadow-3:0 16px 48px rgba(0,0,0,.10),0 4px 12px rgba(0,0,0,.05);
  --ease:cubic-bezier(.22,.61,.36,1);
  --spring:cubic-bezier(.34,1.4,.64,1);
  --t:250ms;
}
html.dark{
  color-scheme:dark;
  --bg:#0A0A0C; --surface:#161618; --surface-2:#1F1F22; --surface-3:#2A2A2E;
  --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.13);
  --text-1:#F5F5F7; --text-2:#A1A1A6; --text-3:#6E6E73;
  --accent:#6E6CE8; --accent-tint:rgba(110,108,232,.18); --accent-tint-2:rgba(110,108,232,.26);
  --blue-tint:rgba(0,102,255,.18); --ok-tint:rgba(47,179,68,.18);
  --warn-tint:rgba(255,138,0,.18); --danger-tint:rgba(255,59,48,.18);
  --purple-tint:rgba(175,82,222,.20); --teal-tint:rgba(48,176,199,.18);
  --shadow-1:0 1px 2px rgba(0,0,0,.3); --shadow-2:0 4px 16px rgba(0,0,0,.4); --shadow-3:0 16px 48px rgba(0,0,0,.55);
}
html.dark .head{background:rgba(10,10,12,.82)}
html.dark .mobile-bar{background:rgba(10,10,12,.92)}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,'SF Pro Display','SF Pro Text','Inter',system-ui,sans-serif;
  background:var(--bg); color:var(--text-1);
  font-size:15px; line-height:1.5; letter-spacing:-0.011em;
  -webkit-font-smoothing:antialiased; font-variant-numeric:tabular-nums;
  transition:background var(--t) var(--ease),color var(--t) var(--ease);
}
::selection{background:var(--accent-tint-2)}
.app{display:grid;grid-template-columns:244px 1fr;min-height:100vh}

/* ===== SIDEBAR ===== */
.side{border-right:1px solid var(--border);padding:18px 12px;display:flex;flex-direction:column;gap:2px;
  position:sticky;top:0;height:100vh;background:var(--bg)}
.brand{display:flex;align-items:center;gap:11px;padding:8px 10px 16px}
.brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#5856D6,#8482F0);
  display:grid;place-items:center;color:#fff;box-shadow:var(--shadow-2);flex-shrink:0}
.brand .logo svg{width:18px;height:18px}
.brand .bt b{font-size:14.5px;font-weight:650;letter-spacing:-0.02em;display:block;line-height:1.15}
.brand .bt span{font-size:11.5px;color:var(--text-3);font-weight:500}
.navsec{font-size:10px;font-weight:650;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:13px 12px 5px}
.nav{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:9px;cursor:pointer;
  font-size:13.5px;font-weight:550;color:var(--text-2);position:relative;
  transition:color var(--t) var(--ease),background var(--t) var(--ease)}
.nav svg{width:16.5px;height:16.5px;flex-shrink:0;opacity:.85;transition:transform var(--t) var(--spring)}
.nav:hover{background:var(--surface-2);color:var(--text-1)}
.nav:hover svg{transform:scale(1.1)}
.nav.active{background:var(--accent-tint);color:var(--accent);font-weight:600}
.nav.active svg{opacity:1}
.nav .badge{margin-left:auto;font-size:10.5px;font-weight:650;background:var(--danger);color:#fff;
  padding:1px 7px;border-radius:20px;min-width:18px;text-align:center}
.nav .badge.soft{background:var(--surface-3);color:var(--text-2)}
.side-foot{margin-top:auto;padding:12px 10px 4px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.side-foot .av{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#5856D6,#8482F0);color:#fff;
  display:grid;place-items:center;font-size:11.5px;font-weight:650}
.side-foot .si{flex:1;min-width:0;line-height:1.25}
.side-foot .si b{font-size:12.5px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-foot .si span{font-size:11px;color:var(--text-3)}
.role-switch{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;
  display:grid;place-items:center;color:var(--text-2);transition:background var(--t),transform var(--t) var(--spring)}
.role-switch:hover{background:var(--surface-2);transform:translateX(2px)}
.role-switch svg{width:14px;height:14px}

/* ===== MAIN ===== */
.main{min-width:0;display:flex;flex-direction:column}
.side-ov{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:59;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);transition:opacity .25s var(--ease)}
.side-ov.open{opacity:1;pointer-events:auto}
.head{position:sticky;top:0;z-index:30;backdrop-filter:saturate(180%) blur(20px);
  background:rgba(251,251,253,.82);
  border-bottom:1px solid var(--border);padding:13px 30px;display:flex;align-items:center;gap:14px}
.cmdk{flex:1;max-width:420px;display:flex;align-items:center;gap:10px;background:var(--surface-2);
  border:1px solid transparent;border-radius:11px;padding:9px 14px;cursor:pointer;
  transition:border-color var(--t) var(--ease),box-shadow var(--t) var(--ease),background var(--t)}
.cmdk:hover{background:var(--surface-3)}
.cmdk svg{width:15px;height:15px;color:var(--text-3)}
.cmdk span{font-size:13.5px;color:var(--text-3);flex:1}
.cmdk .kbd{font-size:11px;color:var(--text-2);background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:2px 7px;font-weight:600}
.head .sp{flex:1}
.hdate{font-size:12.5px;color:var(--text-2);font-weight:500;text-align:right;line-height:1.3}
.hdate b{display:block;color:var(--text-1);font-weight:600;font-size:13px}
.iconbtn{width:37px;height:37px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
  display:grid;place-items:center;cursor:pointer;color:var(--text-2);box-shadow:var(--shadow-1);
  transition:transform var(--t) var(--spring),box-shadow var(--t) var(--ease),color var(--t)}
.iconbtn:hover{transform:translateY(-1px);box-shadow:var(--shadow-2);color:var(--text-1)}
.iconbtn svg{width:16px;height:16px}
.iconbtn.notif{position:relative}
.iconbtn.notif::after{content:"";position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;
  background:var(--danger);border:2px solid var(--surface)}
.hprofile{width:37px;height:37px;border-radius:10px;background:linear-gradient(135deg,#5856D6,#8482F0);color:#fff;
  display:grid;place-items:center;font-size:13px;font-weight:650;cursor:pointer;box-shadow:var(--shadow-2);
  transition:transform var(--t) var(--spring)}
.hprofile:hover{transform:translateY(-1px) scale(1.03)}

.scroll{flex:1;overflow-y:auto;padding:28px 30px 60px}
.view{display:none}
.view.show{display:block;animation:viewIn .5s var(--ease)}
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.vhead{margin-bottom:24px}
.vhead .eye{font-size:11px;font-weight:650;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);margin-bottom:7px}
.vhead h1{font-size:29px;font-weight:700;letter-spacing:-0.035em;line-height:1.05}
.vhead p{font-size:14px;color:var(--text-2);margin-top:6px}
.stagger>*{animation:pop .55s var(--spring) both}
@keyframes pop{from{opacity:0;transform:translateY(13px) scale(.985)}to{opacity:1;transform:none}}

/* ===== ATTENTION BANNER ===== */
.attn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-l);box-shadow:var(--shadow-1);
  padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:20px;position:relative;overflow:hidden}
.attn::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--warn)}
.attn.clear::before{background:var(--ok)}
.attn .ai{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;flex-shrink:0;background:var(--warn-tint);color:var(--warn)}
.attn.clear .ai{background:var(--ok-tint);color:var(--ok)}
.attn .ai svg{width:23px;height:23px}
.attn .aw{flex:1;min-width:0}
.attn .aw b{font-size:16px;font-weight:650;letter-spacing:-0.02em;display:block}
.attn .aw .chips{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
.attn .ac{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px;
  background:var(--surface-2);cursor:pointer;transition:transform var(--t) var(--spring),background var(--t)}
.attn .ac:hover{transform:translateY(-1px);background:var(--surface-3)}
.attn .ac i{width:7px;height:7px;border-radius:50%}

/* ===== PULSE KPIs ===== */
.pulse{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:26px}
@media(max-width:1200px){.pulse{grid-template-columns:repeat(3,1fr)}}
.pk{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-m);padding:18px 18px 16px;
  box-shadow:var(--shadow-1);transition:transform var(--t) var(--spring),box-shadow var(--t) var(--ease);cursor:default}
.pk:hover{transform:translateY(-3px);box-shadow:var(--shadow-2)}
.pk .pi{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;margin-bottom:14px}
.pk .pi svg{width:16px;height:16px}
.pk .pv{font-size:29px;font-weight:700;letter-spacing:-0.04em;line-height:1}
.pk .pl{font-size:12.5px;color:var(--text-2);font-weight:550;margin-top:5px}

.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:1100px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-l);box-shadow:var(--shadow-1);overflow:hidden}
.panel-h{display:flex;align-items:center;justify-content:space-between;padding:19px 22px 15px}
.panel-h h3{font-size:15.5px;font-weight:650;letter-spacing:-0.02em}
.panel-h .more{font-size:12.5px;color:var(--accent);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;
  transition:gap var(--t) var(--ease)}
.panel-h .more:hover{gap:7px}
.panel-h .more svg{width:13px;height:13px}
.panel-h .live{font-size:11.5px;font-weight:600;color:var(--ok);display:inline-flex;align-items:center;gap:6px}
.panel-h .live i{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:blink 2s var(--ease) infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== STATUS LIST ===== */
.slist{padding:5px 10px 12px}
.srow{display:flex;align-items:center;gap:13px;padding:10px;border-radius:12px;cursor:pointer;
  transition:background var(--t) var(--ease),transform var(--t) var(--spring)}
.srow:hover{background:var(--surface-2)}
.srow .av{width:38px;height:38px;border-radius:11px;color:#fff;display:grid;place-items:center;font-size:13px;font-weight:650;flex-shrink:0;position:relative}
.srow .av .pres{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--surface)}
.srow:hover .av .pres{border-color:var(--surface-2)}
.srow .sn{flex:1;min-width:0}
.srow .sn b{font-size:13.5px;font-weight:600;letter-spacing:-0.01em}
.srow .sn span{font-size:12px;color:var(--text-3);display:block}
.statepill{font-size:11.5px;font-weight:650;padding:4px 11px;border-radius:20px;white-space:nowrap}
.sp-on{background:var(--ok-tint);color:var(--ok)}
.sp-late{background:var(--danger-tint);color:var(--danger)}
.sp-lunch{background:var(--warn-tint);color:#b35e00}
.sp-dil{background:var(--teal-tint);color:#1d7d8f}
.sp-off{background:var(--surface-3);color:var(--text-2)}
.sp-done{background:var(--accent-tint);color:var(--accent)}
.sp-vac{background:var(--purple-tint);color:var(--purple)}

/* ===== FEED (Slack) ===== */
.feed{padding:8px 14px 14px}
.fev{display:flex;gap:13px;padding:11px 8px;border-radius:12px;transition:background var(--t)}
.fev:hover{background:var(--surface-2)}
.fev .fi{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.fev .fi svg{width:16px;height:16px}
.fev .fb{flex:1;min-width:0}
.fev .fb .ft{font-size:13.5px;line-height:1.4}
.fev .fb .ft b{font-weight:650}
.fev .fb .fm{font-size:11.5px;color:var(--text-3);margin-top:2px}

/* ===== TIMELINE (Notion) ===== */
.tl{padding:6px 2px}
.tlr{display:flex;gap:15px;position:relative}
.tlr .tll{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.tlr .td{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;z-index:2;
  background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-1)}
.tlr .td svg{width:16px;height:16px}
.tlr .tc{width:2px;flex:1;background:var(--border);margin:4px 0;min-height:22px}
.tlr:last-child .tc{display:none}
.tlr .tb{flex:1;padding-bottom:20px;min-width:0}
.tlr .tt{display:flex;align-items:baseline;gap:8px}
.tlr .tt b{font-size:14px;font-weight:600}
.tlr .tt .tm{font-size:12.5px;color:var(--text-3);font-weight:600;margin-left:auto;font-variant-numeric:tabular-nums}
.tlr .tdesc{font-size:12.5px;color:var(--text-2);margin-top:2px}

/* ===== EQUIPO list ===== */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.segmented{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:11px}
.segmented button{font-family:inherit;font-size:13px;font-weight:550;padding:7px 15px;border:none;background:none;border-radius:8px;
  cursor:pointer;color:var(--text-2);transition:color var(--t),background var(--t),box-shadow var(--t);display:inline-flex;align-items:center;gap:7px}
.segmented button svg{width:14px;height:14px}
.segmented button.active{background:var(--surface);color:var(--text-1);font-weight:600;box-shadow:var(--shadow-1)}
.elist{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-l);box-shadow:var(--shadow-1);overflow:hidden}
.elrow{display:flex;align-items:center;gap:15px;padding:15px 22px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background var(--t) var(--ease)}
.elist .elrow:last-child{border-bottom:none}
.elrow:hover{background:var(--surface-2)}
.elrow .av{width:42px;height:42px;border-radius:12px;color:#fff;display:grid;place-items:center;font-size:14px;font-weight:650;flex-shrink:0;position:relative}
.elrow .av .pres{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--surface)}
.elrow:hover .av .pres{border-color:var(--surface-2)}
.elrow .ei{flex:1;min-width:0}
.elrow .ei b{font-size:14.5px;font-weight:650;letter-spacing:-0.01em}
.elrow .ei span{font-size:12.5px;color:var(--text-3);display:block}
.elrow .ecol{text-align:right;min-width:80px}
.elrow .ecol .v{font-size:14px;font-weight:650}
.elrow .ecol .k{font-size:10.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-top:1px}
@media(max-width:820px){.elrow .ecol.hide{display:none}}

/* gallery */
.egal{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:16px}
.ecard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-l);padding:20px;box-shadow:var(--shadow-1);cursor:pointer;
  transition:transform var(--t) var(--spring),box-shadow var(--t) var(--ease)}
.ecard:hover{transform:translateY(-4px);box-shadow:var(--shadow-3)}
.ecard .et{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.ecard .eav{width:50px;height:50px;border-radius:15px;color:#fff;display:grid;place-items:center;font-size:18px;font-weight:650;flex-shrink:0;box-shadow:var(--shadow-2)}
.ecard .ein b{font-size:15px;font-weight:650;letter-spacing:-0.02em;display:block}
.ecard .ein span{font-size:12px;color:var(--text-2)}
.ecard .emet{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.ecard .em{background:var(--surface-2);border-radius:11px;padding:11px 8px;text-align:center}
.ecard .em b{font-size:16px;font-weight:700;display:block}
.ecard .em span{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.03em;font-weight:600;display:block;margin-top:2px}
.lbar{height:6px;background:var(--surface-3);border-radius:6px;overflow:hidden}
.lbar i{display:block;height:100%;border-radius:6px;width:0;transition:width 1.1s var(--ease)}
.eload-t{display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-2);margin-bottom:6px;font-weight:500}
.eload-t b{color:var(--text-1);font-weight:650}

/* ===== CONTEXT PANEL (Notion right) ===== */
.ctx-ov{position:fixed;inset:0;background:rgba(0,0,0,.18);backdrop-filter:blur(2px);opacity:0;pointer-events:none;
  transition:opacity var(--t) var(--ease);z-index:50}
.ctx-ov.show{opacity:1;pointer-events:auto}
.ctx{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;background:var(--surface);
  border-left:1px solid var(--border);box-shadow:var(--shadow-3);z-index:51;
  transform:translateX(100%);transition:transform .4s var(--ease);overflow-y:auto}
.ctx.show{transform:none}
.ctx-h{padding:24px 24px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.ctx-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;display:grid;place-items:center;color:var(--text-2);transition:background var(--t),transform var(--t) var(--spring)}
.ctx-close:hover{background:var(--surface-2);transform:rotate(90deg)}
.ctx-close svg{width:15px;height:15px}
.ctx-top{display:flex;align-items:center;gap:15px}
.ctx-top .av{width:58px;height:58px;border-radius:17px;color:#fff;display:grid;place-items:center;font-size:21px;font-weight:650;box-shadow:var(--shadow-2);position:relative}
.ctx-top .av .pres{position:absolute;bottom:-1px;right:-1px;width:15px;height:15px;border-radius:50%;border:3px solid var(--surface)}
.ctx-top .ci b{font-size:18px;font-weight:700;letter-spacing:-0.02em;display:block}
.ctx-top .ci span{font-size:13px;color:var(--text-2)}
.ctx-top .ci .statepill{margin-top:7px;display:inline-block}
.ctx-body{padding:22px 24px}
.ctx-sec{margin-bottom:26px}
.ctx-sec h4{font-size:11px;font-weight:650;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:12px}
.ctx-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ctx-stat{background:var(--surface-2);border-radius:13px;padding:14px 16px}
.ctx-stat .v{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.ctx-stat .v.warn{color:var(--warn)} .ctx-stat .v.ok{color:var(--ok)} .ctx-stat .v.purple{color:var(--purple)}
.ctx-stat .k{font-size:11.5px;color:var(--text-2);margin-top:2px;font-weight:500}

/* ===== CALENDAR ===== */
.cal-wrap{display:grid;grid-template-columns:1fr 280px;gap:20px}
@media(max-width:1000px){.cal-wrap{grid-template-columns:1fr}}
.cal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-l);box-shadow:var(--shadow-1);padding:22px}
.cal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-h .cm{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.cal-nav{display:flex;gap:6px}
.cal-nav button{width:31px;height:31px;border-radius:9px;border:1px solid var(--border);background:var(--surface);cursor:pointer;
  color:var(--text-2);display:grid;place-items:center;transition:background var(--t),transform var(--t) var(--spring)}
.cal-nav button:hover{background:var(--surface-2);transform:translateY(-1px)}
.cal-nav button svg{width:14px;height:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{font-size:10.5px;font-weight:650;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;text-align:center;padding-bottom:6px}
.cal-day{aspect-ratio:1;border-radius:12px;padding:8px;display:flex;flex-direction:column;cursor:pointer;position:relative;
  transition:background var(--t) var(--ease),transform var(--t) var(--spring);background:var(--surface-2)}
.cal-day:hover{transform:scale(1.05);box-shadow:var(--shadow-2)}
.cal-day.out{opacity:.32;background:transparent}
.cal-day.today{background:var(--accent);color:#fff}
.cal-day.today .cd-num{color:#fff}
.cal-day .cd-num{font-size:13px;font-weight:600}
.cal-day .cd-dots{display:flex;gap:3px;margin-top:auto;flex-wrap:wrap}
.cal-day .cd-dots i{width:6px;height:6px;border-radius:50%}
.cal-day .heat{position:absolute;inset:0;border-radius:12px;pointer-events:none}
.cal-side{display:flex;flex-direction:column;gap:14px}
.cal-leg{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-m);box-shadow:var(--shadow-1);padding:18px 20px}
.cal-leg h4{font-size:12.5px;font-weight:650;margin-bottom:13px}
.cal-leg .lr{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12.5px;color:var(--text-2)}
.cal-leg .lr i{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cal-leg .lr b{margin-left:auto;color:var(--text-1);font-weight:650}

/* ===== REQUEST CARDS ===== */
.req{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-m);box-shadow:var(--shadow-1);
  padding:17px 20px;display:flex;align-items:center;gap:15px;margin-bottom:11px;
  transition:transform var(--t) var(--spring),box-shadow var(--t) var(--ease)}
.req:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)}
.req .rav{width:42px;height:42px;border-radius:12px;color:#fff;display:grid;place-items:center;font-size:14px;font-weight:650;flex-shrink:0}
.req .rw{flex:1;min-width:0}.req .rw b{font-size:14px;font-weight:650}.req .rw span{font-size:12.5px;color:var(--text-2);display:block;margin-top:1px}
.req .rdate{font-size:12.5px;color:var(--text-2);text-align:right;font-weight:550}.req .rdate b{display:block;color:var(--text-1);font-weight:650;font-size:13.5px}
.req .rchip{font-size:11.5px;font-weight:650;padding:5px 12px;border-radius:20px;white-space:nowrap}
.chip-ok{background:var(--ok-tint);color:var(--ok)}.chip-pend{background:var(--warn-tint);color:#b35e00}
.chip-vac{background:var(--purple-tint);color:var(--purple)}.chip-inc{background:var(--blue-tint);color:var(--blue)}
.chip-fer{background:var(--accent-tint);color:var(--accent)}.chip-com{background:var(--teal-tint);color:#1d7d8f}
.req .ract{display:flex;gap:7px}
.req .rbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;
  display:grid;place-items:center;transition:background var(--t),transform var(--t) var(--spring)}
.req .rbtn:hover{transform:translateY(-1px)}
.req .rbtn.ok:hover{background:var(--ok-tint);color:var(--ok);border-color:transparent}
.req .rbtn.no:hover{background:var(--danger-tint);color:var(--danger);border-color:transparent}
.req .rbtn svg{width:15px;height:15px}

/* incidencias grid */
.inc-types{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:13px;margin-bottom:26px}
.inctype{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-m);padding:18px;box-shadow:var(--shadow-1);
  cursor:pointer;transition:transform var(--t) var(--spring),box-shadow var(--t) var(--ease)}
.inctype:hover{transform:translateY(-3px);box-shadow:var(--shadow-2)}
.inctype .ii{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;margin-bottom:12px}
.inctype .ii svg{width:19px;height:19px}
.inctype b{font-size:14px;font-weight:650;display:block}
.inctype span{font-size:12px;color:var(--text-2)}
.inctype .cnt{font-size:22px;font-weight:700;letter-spacing:-0.03em;margin-top:8px}

/* reportes */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.repcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-m);padding:20px;box-shadow:var(--shadow-1);
  cursor:pointer;transition:transform var(--t) var(--spring),box-shadow var(--t) var(--ease)}
.repcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-2)}
.repcard .ri{width:40px;height:40px;border-radius:11px;background:var(--accent-tint);color:var(--accent);display:grid;place-items:center;margin-bottom:14px}
.repcard .ri svg{width:19px;height:19px}
.repcard b{font-size:14.5px;font-weight:650;display:block}
.repcard span{font-size:12.5px;color:var(--text-2);display:block;margin-top:2px}
.repcard .exp{display:flex;gap:7px;margin-top:14px}
.repcard .exp span{font-size:11px;font-weight:650;padding:4px 10px;border-radius:7px;background:var(--surface-2);color:var(--text-2)}

/* settings */
.set-grid{display:grid;gap:13px;max-width:620px}
.set-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-m);box-shadow:var(--shadow-1);
  padding:17px 22px;display:flex;align-items:center;gap:16px}
.set-row .si2{width:40px;height:40px;border-radius:11px;background:var(--accent-tint);color:var(--accent);display:grid;place-items:center;flex-shrink:0}
.set-row .si2 svg{width:18px;height:18px}
.set-row .sw{flex:1}.set-row .sw b{font-size:14px;font-weight:650;display:block}.set-row .sw span{font-size:12.5px;color:var(--text-2)}
.toggle{width:46px;height:28px;border-radius:20px;background:var(--surface-3);cursor:pointer;position:relative;transition:background var(--t) var(--ease);flex-shrink:0}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:var(--shadow-1);transition:transform var(--t) var(--spring)}
.toggle.on{background:var(--accent)}.toggle.on::after{transform:translateX(18px)}



/* ===== TABLA (vista del día / históricos) ===== */
.table-wrap{overflow-x:auto;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.table-wrap table{min-width:720px}
table{width:100%;border-collapse:collapse}
thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:650;color:var(--text-3);text-align:left;
  padding:13px 16px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface-2)}
thead th.r{text-align:right}
tbody td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s var(--ease)}
tbody tr:hover{background:var(--surface-2)}
.c-day{font-weight:650;letter-spacing:-0.01em}
.c-date{font-size:12.5px;color:var(--text-2);font-variant-numeric:tabular-nums}
.c-time{font-size:13px;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
.c-time.muted{color:var(--text-3)}
.c-hrs{font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.c-ext{text-align:right;color:var(--warn);font-weight:600;font-variant-numeric:tabular-nums}
.c-ext.zero{color:var(--text-3);font-weight:400}
.pin{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:20px;white-space:nowrap}
.pin.ok{background:var(--ok-tint);color:#137a39}
.pin.curso{background:var(--accent-tint);color:var(--accent)}
.pin.falta{background:var(--danger-tint);color:var(--danger)}
@media(max-width:1050px){thead th.hide2,tbody td.hide2{display:none}}
@media(max-width:820px){thead th.hide,tbody td.hide{display:none}}

/* ===== DRAWER (formularios) ===== */
.drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.18);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity var(--t) var(--ease);z-index:70}
.drawer-ov.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:94vw;background:var(--surface);border-left:1px solid var(--border);
  box-shadow:var(--shadow-3);z-index:71;transform:translateX(100%);transition:transform .38s var(--ease);overflow-y:auto}
.drawer.show{transform:none}
.drawer-h{padding:24px 26px 20px;border-bottom:1px solid var(--border);position:relative}
.drawer-h h3{font-size:19px;font-weight:700;letter-spacing:-0.02em}
.drawer-h p{font-size:12.5px;color:var(--text-2);margin-top:4px}
.drawer-body{padding:22px 26px}
.dfield{margin-bottom:18px}
.dfield label{display:block;font-size:12.5px;font-weight:600;color:var(--text-2);margin-bottom:7px}
.dinput{width:100%;padding:11px 14px;border:1px solid var(--border-2);border-radius:11px;background:var(--surface-2);
  font-family:inherit;font-size:14px;color:var(--text-1);outline:none;transition:border-color var(--t),box-shadow var(--t),background var(--t)}
.dinput:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 4px var(--accent-tint)}
.drawer-actions{display:flex;gap:10px;margin-top:26px}
.dbtn{flex:1;padding:12px;border-radius:11px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:transform var(--t) var(--spring),background var(--t),box-shadow var(--t)}
.dbtn.pri{background:var(--accent);color:#fff;border:none;box-shadow:var(--shadow-2)}
.dbtn.pri:hover{transform:translateY(-1px);filter:brightness(1.05)}
.dbtn.ghost{background:var(--surface);border:1px solid var(--border);color:var(--text-1)}
.dbtn.ghost:hover{background:var(--surface-2)}
/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text-1);color:var(--bg);
  font-size:13.5px;font-weight:600;padding:13px 22px;border-radius:12px;box-shadow:var(--shadow-3);z-index:90;opacity:0;pointer-events:none;
  transition:opacity var(--t) var(--ease),transform var(--t) var(--spring)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* botón + agregar en cabeceras */
.add-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:11px;background:var(--accent);color:#fff;border:none;
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-2);transition:transform var(--t) var(--spring),filter var(--t)}
.add-btn:hover{transform:translateY(-1px);filter:brightness(1.06)}
.add-btn svg{width:15px;height:15px}
.vhead-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}

/* ===== COMMAND PALETTE ===== */
.cmd-ov{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(6px);opacity:0;pointer-events:none;
  transition:opacity var(--t) var(--ease);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding-top:14vh}
.cmd-ov.show{opacity:1;pointer-events:auto}
.cmd{width:560px;max-width:92vw;background:var(--surface);border:1px solid var(--border-2);border-radius:18px;
  box-shadow:var(--shadow-3);overflow:hidden;transform:scale(.96) translateY(-8px);transition:transform var(--t) var(--spring)}
.cmd-ov.show .cmd{transform:none}
.cmd-in{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border)}
.cmd-in svg{width:18px;height:18px;color:var(--text-3)}
.cmd-in input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:16px;color:var(--text-1);letter-spacing:-0.01em}
.cmd-in input::placeholder{color:var(--text-3)}
.cmd-in .esc{font-size:11px;color:var(--text-3);background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-weight:600}
.cmd-list{max-height:380px;overflow-y:auto;padding:8px}
.cmd-grp{font-size:10.5px;font-weight:650;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);padding:10px 12px 5px}
.cmd-it{display:flex;align-items:center;gap:13px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background var(--t)}
.cmd-it.sel,.cmd-it:hover{background:var(--accent-tint)}
.cmd-it .ci{width:32px;height:32px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;color:var(--text-2);flex-shrink:0}
.cmd-it.sel .ci{background:var(--accent);color:#fff}
.cmd-it .ci svg{width:16px;height:16px}
.cmd-it .ct{flex:1;font-size:13.5px;font-weight:550}
.cmd-it .ck{font-size:11px;color:var(--text-3);font-weight:600}

/* ===== GANTT DIARIO ===== */
.gantt{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-l);box-shadow:var(--shadow-1);
  overflow:hidden;margin-bottom:20px}
.gantt-h{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid var(--border)}
.gantt-h h3{font-size:15.5px;font-weight:650;letter-spacing:-0.02em}
.gantt-h .gnav{display:flex;align-items:center;gap:10px}
.gantt-h .gdate{font-size:13px;font-weight:600;color:var(--text-1)}
.gantt-scroll{overflow-x:auto;scrollbar-width:thin}
.gantt-inner{min-width:760px}
.gantt-axis{display:grid;grid-template-columns:150px 1fr;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.gantt-axis .axl{padding:10px 16px;font-size:10.5px;font-weight:650;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3)}
.gantt-axis .hours{display:flex;position:relative}
.gantt-axis .hr{flex:1;text-align:center;font-size:10.5px;font-weight:600;color:var(--text-3);padding:10px 0;border-left:1px solid var(--border);font-variant-numeric:tabular-nums}
.gantt-row{display:grid;grid-template-columns:150px 1fr;border-bottom:1px solid var(--border);transition:background var(--t)}
.gantt-row:last-child{border-bottom:none}
.gantt-row:hover{background:var(--surface-2)}
.gantt-row .gperson{display:flex;align-items:center;gap:11px;padding:14px 16px;cursor:pointer;min-width:0}
.gantt-row .gperson .av{width:32px;height:32px;border-radius:9px;color:#fff;display:grid;place-items:center;font-size:11.5px;font-weight:650;flex-shrink:0;position:relative}
.gantt-row .gperson .av .pres{position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;border:2px solid var(--surface)}
.gantt-row:hover .gperson .av .pres{border-color:var(--surface-2)}
.gantt-row .gperson .gn{min-width:0}
.gantt-row .gperson .gn b{font-size:13px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.01em}
.gantt-row .gperson .gn span{font-size:11px;color:var(--text-3)}
.gantt-track{position:relative;display:flex;align-items:center;padding:0 0;margin:0;height:auto}
.gantt-track .gridlines{position:absolute;inset:0;display:flex;pointer-events:none}
.gantt-track .gridlines i{flex:1;border-left:1px solid var(--border)}
.gantt-track .gnow{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);z-index:3;opacity:.6}
.gantt-track .gnow::before{content:"";position:absolute;top:-1px;left:-3px;width:8px;height:8px;border-radius:50%;background:var(--danger)}
.gbar{position:absolute;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:650;color:#fff;z-index:2;overflow:hidden;white-space:nowrap;
  box-shadow:0 1px 3px rgba(0,0,0,.12);transition:transform var(--t) var(--spring),filter var(--t);cursor:pointer}
.gbar:hover{transform:scaleY(1.12);filter:brightness(1.05);z-index:4}
.gbar.work{background:var(--c)}
.gbar.lunch{background:repeating-linear-gradient(45deg,var(--warn),var(--warn) 5px,#d97400 5px,#d97400 10px)}
.gbar.dil{background:repeating-linear-gradient(45deg,var(--teal),var(--teal) 5px,#1d7d8f 5px,#1d7d8f 10px)}
.gantt-track .gmark{position:absolute;width:20px;height:20px;border-radius:7px;display:grid;place-items:center;z-index:3;
  background:var(--surface);box-shadow:var(--shadow-1);border:1px solid var(--border)}
.gantt-track .gmark svg{width:11px;height:11px}
.gantt-legend{display:flex;gap:18px;padding:14px 24px;border-top:1px solid var(--border);flex-wrap:wrap}
.gantt-legend .gl{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2);font-weight:500}
.gantt-legend .gl i{width:14px;height:10px;border-radius:3px}
.gantt-legend .gl i.lunch{background:repeating-linear-gradient(45deg,var(--warn),var(--warn) 3px,#c47200 3px,#c47200 6px)}
.gantt-legend .gl i.dil{background:repeating-linear-gradient(45deg,var(--teal),var(--teal) 3px,#1d7d8f 3px,#1d7d8f 6px)}

/* ===== FOOTER ===== */
.appfoot{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 0 6px;margin-top:34px;
  border-top:1px solid var(--border);flex-wrap:wrap}
.appfoot .made{font-size:12.5px;color:var(--text-2);display:flex;align-items:center;gap:6px}
.appfoot .made .hb{color:var(--danger)}
.appfoot .made b{color:var(--text-1);font-weight:650}
.appfoot .sync{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--text-3)}
.appfoot .sync .syncdot{display:inline-flex;align-items:center;gap:6px;font-weight:600;color:var(--ok)}
.appfoot .sync .syncdot i{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:blink 2s var(--ease) infinite}
.appfoot .sync .ver{font-variant-numeric:tabular-nums}


/* ===== MÓVIL: sidebar como drawer ===== */
.mobile-bar{display:none}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;top:0;left:0;bottom:0;width:264px;z-index:60;transform:translateX(-100%);
    transition:transform .32s var(--ease);box-shadow:var(--shadow-3)}
  .side.open{transform:none;display:flex}
  .side-ov{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);opacity:0;pointer-events:none;
    transition:opacity .25s var(--ease);z-index:59}
  .side-ov.open{opacity:1;pointer-events:auto}
  .mobile-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:40;background:rgba(251,251,253,.92);backdrop-filter:blur(20px)}
  .mobile-bar .mb-menu{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    display:grid;place-items:center;cursor:pointer;color:var(--text-1)}
  .mobile-bar .mb-menu svg{width:18px;height:18px}
  .mobile-bar .mb-brand{font-size:15px;font-weight:650;letter-spacing:-0.02em;flex:1}
  .head{display:none}
  .pulse{grid-template-columns:repeat(2,1fr)}
  .ctx{width:100vw}
  .appfoot{justify-content:center;text-align:center}
  .grid2{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3.5"/></svg></div>
      <div class="bt"><b>CERT Nexus</b><span>Recursos Humanos</span></div>
    </div>
    <nav id="nav"></nav>
    <div class="side-foot"><div class="av">RH</div><div class="si"><b>Dirección RH</b><span>Solo lectura</span></div></div>
  </aside>
  <div class="main">
    <div class="side-ov" id="sideOv" onclick="closeSide()"></div>
    <div class="mobile-bar">

<script>
// ============ DATA (capa visual, no lógica) ============

// ============ CONFIG · PUENTE CON GOOGLE SHEETS ============

const NEXUS_API = 'https://script.google.com/macros/s/AKfycbxm0mKnyg2mg1D9MFBCEgiGXHthSIDEV4DFl06dFsQIy79q8CRqFUyPQv9lVxrV5wx-/exec';
let SYNC_STATE = 'cargando';

// EMP demo (se reemplaza con datos reales si NEXUS_API responde)

const STATE_CLASS={on:'sp-on',lunch:'sp-lunch',dil:'sp-dil',done:'sp-done',vac:'sp-vac',off:'sp-off',guard:'sp-dil'};
const STATE_DOT={on:'var(--ok)',lunch:'var(--warn)',dil:'var(--teal)',done:'var(--accent)',vac:'var(--purple)',off:'var(--text-3)',guard:'var(--teal)'};
const STATE_ORDER={on:0,lunch:1,dil:2,done:3,guard:4,vac:5,off:6};

const I={
  dash:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  team:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  act:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  cal:'<rect x="3" y="4" width="18" height="18" rx="2.5"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  inc:'<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  vac:'<path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>',
  perm:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  incap:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  fer:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  rep:'<path d="M3 3v18h18"/><rect x="7" y="12" width="3" height="6"/><rect x="12" y="8" width="3" height="10"/><rect x="17" y="5" width="3" height="13"/>',
  set:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  arrow:'<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
  enter:'<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>',
  exit:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
  fin:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
  dil:'<path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>',
  clock:'<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  eye:'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
  msg:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  chev:'<polyline points="15 18 9 12 15 6"/>', chevr:'<polyline points="9 18 15 12 9 6"/>',
  grid:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
  list:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
  bell:'<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>',
  globe:'<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
  lock:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  home:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  down:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
};
function sv(p,w){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w||1.7}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;}

const NAV=[
  {sec:'Operación'},
  {id:'dash',t:'Dashboard',ic:'dash'},
  {id:'gantt',t:'Vista del día',ic:'clock'},
  {id:'team',t:'Equipo',ic:'team'},
  {id:'act',t:'Mi Jornada',ic:'act'},
  {id:'cal',t:'Calendario',ic:'cal'},
  {id:'guard',t:'Guardias',ic:'dil'},
  {sec:'Gestión'},
  {id:'inc',t:'Centro de Incidencias',ic:'inc'},
  {id:'vac',t:'Vacaciones',ic:'vac'},
  {id:'perm',t:'Permisos',ic:'perm'},
  {id:'incap',t:'Incapacidades',ic:'incap'},
  {id:'fer',t:'Días Inhábiles',ic:'fer',soft:1},
  {sec:'Sistema'},
  {id:'rep',t:'Reportes',ic:'rep'},
  {id:'admin',t:'Administración',ic:'set'},
];
let current='dash';


// ============ ROLES (Admin · RH · Empleado) ============
const ROLES={
  admin:{label:'Administrador',sub:'Control total',avatar:'AD',
    nav:['dash','gantt','team','act','cal','guard','inc','vac','perm','incap','fer','rep','admin'],
    canAdd:true, seeAll:true},
  rh:{label:'Recursos Humanos',sub:'Solo lectura',avatar:'RH',
    nav:['dash','team','cal','guard','vac','perm','incap','rep'],
    canAdd:false, seeAll:true, readonly:true},
  empleado:{label:'Empleado',sub:'Mi información',avatar:'EM',self:'samu',
    nav:['act','cal','vac','perm','incap','rep'],
    canAdd:false, seeAll:false},
};
let currentRole='admin';
function setRole(r){
  currentRole=r;
  const role=ROLES[r];
  if(!role.nav.includes(current)) current=role.nav[0];
  buildNav(); render();
  const sf=document.querySelector('.side-foot');
  if(sf) sf.innerHTML=`<div class="av">${role.avatar}</div><div class="si"><b>${role.label}</b><span>${role.sub}</span></div>
    <button class="role-switch" onclick="cycleRole()" title="Cambiar rol">${sv(I.chevr,2)}</button>`;
  const hp=document.getElementById('hprofile');
  if(hp) hp.textContent=role.avatar;
}
// ===== FECHA DINÁMICA (hoy real) =====
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_SEM=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
function hoyTexto(){
  const d=new Date();
  return {dia:DIAS_SEM[d.getDay()],num:d.getDate(),mes:MESES[d.getMonth()],anio:d.getFullYear(),
    hora:d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:true}).toUpperCase()};
}
function pintarFecha(){
  const t=hoyTexto();const el=document.getElementById('hdate');
  if(el)el.innerHTML=`<b>${t.dia} ${t.num}</b><span>${t.mes} ${t.anio} · ${t.hora}</span>`;
}
function cycleRole(){const ks=Object.keys(ROLES);const i=ks.indexOf(currentRole);setRole(ks[(i+1)%ks.length]);}

function buildNav(){
  const el=document.getElementById('nav');el.innerHTML='';
  const allowed=ROLES[currentRole].nav;
  let lastSec=null;
  NAV.forEach(it=>{
    if(it.sec){lastSec=it.sec;return;}
    if(!allowed.includes(it.id))return;
    // imprimir encabezado de sección si hay items visibles en ella (lazy)
    if(lastSec){const s=document.createElement('div');s.className='navsec';s.textContent=lastSec;el.appendChild(s);lastSec=null;}
    const b=document.createElement('div');b.className='nav'+(it.id===current?' active':'');
    const label=currentRole==='empleado'?miLabel(it.t):it.t;
    b.innerHTML=sv(I[it.ic])+`<span>${label}</span>`+(it.badge?`<span class="badge${it.soft?' soft':''}">${it.badge}</span>`:'');
    b.onclick=()=>goto(it.id);el.appendChild(b);
  });
}
function miLabel(t){const map={'Mi Jornada':'Mi Jornada','Calendario':'Mi Calendario','Vacaciones':'Mis Vacaciones','Permisos':'Mis Permisos','Incapacidades':'Mis Incapacidades','Reportes':'Mis Reportes'};return map[t]||t;}
function goto(id){current=id;buildNav();render();closeCmd();closeSide();}
function openSide(){document.querySelector('.side').classList.add('open');document.getElementById('sideOv').classList.add('open');}
function closeSide(){document.querySelector('.side').classList.remove('open');document.getElementById('sideOv').classList.remove('open');}
function vhead(e,t,s){return `<div class="vhead"><div class="eye">${e}</div><h1>${t}</h1>${s?`<p>${s}</p>`:''}</div>`;}
function vheadBtn(e,t,s,drawerKey,btnLabel){const btn=ROLES[currentRole].canAdd?`<button class="add-btn" onclick="openDrawer('${drawerKey}')">${sv(I.plus,2)}${btnLabel}</button>`:'';return `<div class="vhead"><div class="vhead-row"><div><div class="eye">${e}</div><h1>${t}</h1>${s?`<p>${s}</p>`:''}</div>${btn}</div></div>`;}
const fmtState=e=>`<span class="statepill ${STATE_CLASS[e.state]}">${e.stl}</span>`;
const avatar=(e,sz)=>`<div class="av" style="background:${e.color}">${e.init}<span class="pres" style="background:${STATE_DOT[e.state]}"></span></div>`;

// ============ DASHBOARD (gira alrededor del día) ============
function viewDash(){
  if(!EMP.length){
    const msg = SYNC_STATE==='error'
      ? {t:'Sin conexión a Google Sheets',s:'No pudimos cargar los datos. Revisa la conexión o vuelve a intentar.',ic:'inc',c:'--warn'}
      : SYNC_STATE==='vacio'
      ? {t:'Conectado · sin registros aún',s:'La conexión funciona, pero todavía no hay fichajes para mostrar.',ic:'clock',c:'--text-2'}
      : {t:'Conectando con Google Sheets…',s:'Cargando los datos de tu equipo.',ic:'clock',c:'--accent'};
    return vhead('Hoy','Centro operativo','')+`
      <div class="panel" style="padding:60px 30px;text-align:center;max-width:520px;margin:40px auto">
        <div style="width:54px;height:54px;border-radius:15px;margin:0 auto 18px;display:grid;place-items:center;background:var(${msg.c}-tint);color:var(${msg.c})">${sv(I[msg.ic],1.8)}</div>
        <div style="font-size:18px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px">${msg.t}</div>
        <div style="font-size:14px;color:var(--text-2);line-height:1.5">${msg.s}</div>
        ${SYNC_STATE==='error'?'<button class="add-btn" style="margin-top:20px" onclick="cargar()">Reintentar</button>':''}
      </div>`+footer();
  }
  const present=EMP.filter(e=>['on','late','lunch','dil'].includes(e.state)).length;
  const counts={on:0,lunch:0,dil:0,done:0,vac:0,guard:0};
  EMP.forEach(e=>counts[e.state]!==undefined&&counts[e.state]++);
  const totalHoras=EMP.reduce((s,e)=>{const m=e.horasPeriodo.match(/(\d+)h/);return s+(m?+m[1]:0);},0);
  const pulse=[
    {v:present,l:'En jornada',c:'--ok',ic:'enter'},
    {v:counts.lunch,l:'En comida',c:'--warn',ic:'exit'},
    {v:counts.done,l:'Completaron',c:'--accent',ic:'fin'},
    {v:counts.vac,l:'Vacaciones',c:'--purple',ic:'vac'},
    {v:'1',l:'De guardia (sáb)',c:'--teal',ic:'dil'},
  ];
  const pulseH=pulse.map(p=>`<div class="pk">
    <div class="pi" style="background:var(${p.c}-tint);color:var(${p.c})">${sv(I[p.ic],1.8)}</div>
    <div class="pv" style="color:var(${p.c})">${p.v}</div><div class="pl">${p.l}</div></div>`).join('');

  const sorted=[...EMP].sort((a,b)=>STATE_ORDER[a.state]-STATE_ORDER[b.state]);
  const statusH=sorted.map(e=>`
    <div class="srow" onclick="openCtx('${e.id}')">
      ${avatar(e)}
      <div class="sn"><b>${e.n}</b><span>${e.area} · ${e.ult}</span></div>
      ${fmtState(e)}
    </div>`).join('');

  const _t=hoyTexto();return vhead('Hoy · '+_t.dia+' '+_t.num+' de '+_t.mes,'Centro operativo',_t.hora+' · Esto es lo que requiere tu atención')+`
    <div class="attn stagger" style="animation-delay:0ms">
      <div class="ai">${sv(I.inc,2)}</div>
      <div class="aw"><b>3 cosas requieren tu atención</b>
        <div class="chips">
          <span class="ac" onclick="goto('vac')"><i style="background:var(--purple)"></i>6 justificaciones pendientes de autorizar</span>
          <span class="ac" onclick="openCtx('angelica')"><i style="background:var(--ok)"></i>Angélica: 9h 48m extra acumuladas esta semana</span>
          <span class="ac" onclick="goto('rep')"><i style="background:var(--accent)"></i>Reporte semanal (17–25 jun) listo</span>
        </div>
      </div>
    </div>
    <div class="pulse stagger">${pulseH}</div>
    <div class="grid2">
      <div class="panel"><div class="panel-h"><h3>Estado del equipo</h3><span class="live"><i></i>En vivo</span></div>
        <div class="slist">${statusH}</div></div>
      <div class="panel"><div class="panel-h"><h3>Actividad reciente</h3><span class="more" onclick="goto('act')">Ver todo ${sv(I.arrow,2)}</span></div>
        <div class="feed">${feedHTML(5)}</div></div>
    </div>`+footer();
}

// ============ ACTIVIDAD (feed Slack) — dinámico desde EMP real ============
function construirFeed(){
  const ev=[];
  EMP.forEach(e=>{
    (e.tl||[]).forEach(t=>{
      const ic=t[0],label=t[1],hora=t[2];
      ev.push({ic:ic, c: ic==='exit'?'--warn':ic==='fin'?'--accent':'--ok',
        who:e.n, ev: label.toLowerCase().replace('entrada a trabajo','registró entrada')
          .replace('salida a comer','salió a comer').replace('regreso de comida','regresó de comer')
          .replace('fin de jornada','terminó su jornada'),
        m:hora, hora:hora});
    });
  });
  // ordenar por hora (más reciente primero, aproximado)
  return ev.reverse();
}
function feedHTML(limit){
  const FEED=construirFeed();
  if(!FEED.length) return `<div style="padding:30px;text-align:center;color:var(--text-3);font-size:13.5px">${emptyMsg()}</div>`;
  const l=limit?FEED.slice(0,limit):FEED;
  return l.map(f=>`<div class="fev">
    <div class="fi" style="background:var(${f.c}-tint);color:var(${f.c})">${sv(I[f.ic])}</div>
    <div class="fb"><div class="ft"><b>${f.who}</b> ${f.ev}</div><div class="fm">${f.m}</div></div>
  </div>`).join('');
}
function viewAct(){
  return vhead('En vivo','Actividad','Cada movimiento del equipo, en tiempo real')+
    `<div class="panel" style="max-width:680px"><div class="panel-h"><h3>Hoy</h3><span class="live"><i></i>En vivo</span></div>
     <div class="feed">${feedHTML(null)}</div></div>`+footer();
}

function emptyMsg(){
  return SYNC_STATE==='error'?'Sin conexión a Google Sheets · revisa la conexión'
    :SYNC_STATE==='vacio'?'Conectado · sin registros aún'
    :'Cargando datos del equipo…';
}
// ============ EQUIPO (lista + galería + panel ctx) ============
let teamView='list';
function viewTeam(){
  if(!EMP.length) return vhead('Equipo','Equipo',emptyMsg());
  const sorted=[...EMP].sort((a,b)=>STATE_ORDER[a.state]-STATE_ORDER[b.state]);
  let body;
  if(teamView==='list'){
    body=`<div class="elist">${sorted.map(e=>`
      <div class="elrow" onclick="openCtx('${e.id}')">
        ${avatar(e)}
        <div class="ei"><b>${e.n}</b><span>${e.area}</span></div>
        <div class="ecol hide"><div class="v">${e.horas}</div><div class="k">Hoy</div></div>
        <div class="ecol hide"><div class="v">${e.vac}</div><div class="k">Vac. rest.</div></div>
        <div class="ecol">${fmtState(e)}</div>
      </div>`).join('')}</div>`;
  }else{
    body=`<div class="egal stagger">${sorted.map(e=>`
      <div class="ecard" onclick="openCtx('${e.id}')">
        <div class="et"><div class="eav" style="background:${e.color}">${e.init}</div>
          <div class="ein"><b>${e.n}</b><span>${e.area}</span></div></div>

// ============ GANTT DIARIO (pantalla protagonista) ============
// Escala: 8:00 a 18:00 (10 horas). pct = (hora-8)/10*100
function hpct(t){ // "09:28 AM" -> percent
  if(!t||t==='—')return null;
  const m=t.match(/(\d+):(\d+)\s*(AM|PM)/);if(!m)return null;
  let h=+m[1];const mm=+m[2];const ap=m[3];
  if(ap==='PM'&&h!==12)h+=12; if(ap==='AM'&&h===12)h=0;
  const dec=h+mm/60; return Math.max(0,Math.min(100,(dec-8)/13*100));
}

function openDrawer(key){
  const f=DRAWER_FORMS[key];if(!f)return;
  const body=f.fields.map(fl=>{
    const [lbl,type]=fl;
    if(type.startsWith('select:')){
      const opts=type.slice(7).split(',').map(o=>`<option>${o}</option>`).join('');
      return `<div class="dfield"><label>${lbl}</label><select class="dinput">${opts}</select></div>`;
    }
    return `<div class="dfield"><label>${lbl}</label><input class="dinput" type="${type}" placeholder="${type==='date'?'':'Escribe aquí…'}"></div>`;
  }).join('');
  document.getElementById('drawer').innerHTML=`
    <div class="drawer-h"><button class="ctx-close" onclick="closeDrawer()">${sv(I.x,2)}</button>
      <h3>${f.t}</h3><p>Los cambios se sincronizan con Google Sheets</p></div>
    <div class="drawer-body">${body}
      <div class="drawer-actions">
        <button class="dbtn ghost" onclick="closeDrawer()">Cancelar</button>
        <button class="dbtn pri" onclick="saveDrawer()">Guardar</button>
      </div>
    </div>`;
  document.getElementById('drawerOv').classList.add('show');
  document.getElementById('drawer').classList.add('show');
}
function closeDrawer(){document.getElementById('drawerOv').classList.remove('show');document.getElementById('drawer').classList.remove('show');}

function toast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2600);
}

const CMDS=[
  {grp:'Ir a',items:[
    {ic:'dash',t:'Dashboard',k:'G D',a:()=>goto('dash')},
    {ic:'clock',t:'Día (Gantt)',k:'G G',a:()=>goto('gantt')},
    {ic:'team',t:'Equipo',k:'G E',a:()=>goto('team')},
    {ic:'act',t:'Actividad',k:'G A',a:()=>goto('act')},
    {ic:'cal',t:'Calendario',k:'G C',a:()=>goto('cal')},
    {ic:'rep',t:'Reportes',k:'G R',a:()=>goto('rep')},
  ]},
  {grp:'Acciones',items:[
    {ic:'plus',t:'Agregar incidencia',k:'',a:()=>{goto('inc');}},
    {ic:'vac',t:'Registrar vacaciones',k:'',a:()=>{goto('vac');}},
    {ic:'down',t:'Exportar reporte',k:'',a:()=>{goto('rep');}},
  ]},
  {grp:'Empleados',items:EMP.map(e=>({ic:'team',t:e.n,k:'',a:()=>{closeCmd();openCtx(e.id);}}))},
];
let cmdSel=0,cmdFlat=[];
function renderCmd(filter){
  const list=document.getElementById('cmdList');list.innerHTML='';cmdFlat=[];
  const f=(filter||'').toLowerCase();
  CMDS.forEach(g=>{
    const items=g.items.filter(it=>it.t.toLowerCase().includes(f));
    if(!items.length)return;
    const h=document.createElement('div');h.className='cmd-grp';h.textContent=g.grp;list.appendChild(h);
    items.forEach(it=>{
      const idx=cmdFlat.length;cmdFlat.push(it);
      const d=document.createElement('div');d.className='cmd-it'+(idx===cmdSel?' sel':'');
      d.innerHTML=`<div class="ci">${sv(I[it.ic])}</div><div class="ct">${it.t}</div>${it.k?`<div class="ck">${it.k}</div>`:''}`;
      d.onmouseenter=()=>{cmdSel=idx;updSel();};
      d.onclick=()=>it.a();
      list.appendChild(d);
    });
  });
}
function updSel(){document.querySelectorAll('.cmd-it').forEach((el,i)=>el.classList.toggle('sel',i===cmdSel));}
function openCmd(){document.getElementById('cmdOv').classList.add('show');const inp=document.getElementById('cmdInput');inp.value='';cmdSel=0;renderCmd('');setTimeout(()=>inp.focus(),60);}
function closeCmd(){document.getElementById('cmdOv').classList.remove('show');}
document.getElementById('cmdInput').addEventListener('input',e=>{cmdSel=0;renderCmd(e.target.value);});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('cmdOv').classList.contains('show')?closeCmd():openCmd();return;}
  if(e.key==='Escape'){closeCmd();closeCtx();}
  if(document.getElementById('cmdOv').classList.contains('show')){
    if(e.key==='ArrowDown'){e.preventDefault();cmdSel=Math.min(cmdSel+1,cmdFlat.length-1);updSel();}
    if(e.key==='ArrowUp'){e.preventDefault();cmdSel=Math.max(cmdSel-1,0);updSel();}
    if(e.key==='Enter'&&cmdFlat[cmdSel]){cmdFlat[cmdSel].a();}
  }
});

// ============ ARRANQUE + PUENTE DE DATOS ============
function aplicarDatos(json){
  if(!json||!json.empleados||!json.empleados.length)return false;
  const VAC={samu:8,angelica:12,jorge:6,citlaly:10};
  const COL={samu:'#5856D6',angelica:'#FF3B30',jorge:'#FF8A00',citlaly:'#0066FF'};
  const INI={samu:'SC',angelica:'AT',jorge:'JM',citlaly:'CM'};
  EMP=json.empleados.map(e=>{
    const tl=[];const x=e.dias&&e.dias.length?e.dias[e.dias.length-1]:null;
    if(x){
      if(x.entrada)tl.push(['enter','Entrada a trabajo',x.entrada,'Inicio de jornada','ok']);
      if(x.salidaComer)tl.push(['exit','Salida a comer',x.salidaComer,'Descanso','lunch']);
      if(x.regresoComer)tl.push(['enter','Regreso de comida',x.regresoComer,'Reanuda','ok']);
      if(x.fin)tl.push(['fin','Fin de jornada',x.fin,'Cierra el día','done']);
    }
    return {id:e.id,n:e.n,area:e.area,puesto:e.area,color:COL[e.id]||'#5856D6',init:INI[e.id]||e.n.slice(0,2).toUpperCase(),
      state:e.state,stl:e.stl,horas:x?x.horasTrab:'—',horasPeriodo:e.horasPeriodo,extra:e.extra,
      objetivo:(e.objetivoMin/60)+'h objetivo',cumplidos:e.cumplidos,totalDias:e.totalDias,
      vac:VAC[e.id]||10,in:x?x.entrada:'—',out:x?x.fin:'—',lunch:x?x.salidaComer:'—',back:x?x.regresoComer:'—',
      ult:e.ult,horario:(e.objetivoMin/60)+'h objetivo',carga:Math.min(95,Math.round((e.cumplidos/Math.max(1,e.totalDias))*100)),tl};
  });
  // Construir WEEK (tabla Vista del día) desde los días reales
  WEEK={};
  json.empleados.forEach(e=>{
    WEEK[e.id]={nombre:e.n,rows:(e.dias||[]).map(d=>({
      dia:d.dia,fecha:d.fecha,entrada:d.entrada||'—',comer:d.salidaComer||'—',regreso:d.regresoComer||'—',
      salDil:'—',regDil:'—',fin:d.fin||'—',horas:d.horasTrab,extra:d.horasExtra,cumplio:d.cumplio}))};
  });
  // Vacaciones reales
  VACDATA = (json.vacaciones||[]).filter(v=>v.empleado);
  return true;
}
function syncFooter(){
  document.querySelectorAll('.appfoot .syncdot').forEach(el=>{
    if(SYNC_STATE==='ok'){el.innerHTML='<i></i>Sincronizado con Google Sheets';el.style.color='var(--ok)';}
    else if(SYNC_STATE==='error'){el.innerHTML='<i style="background:var(--warn);animation:none"></i>Sin conexión a Sheets';el.style.color='var(--warn)';}
    else if(SYNC_STATE==='vacio'){el.innerHTML='<i style="background:var(--text-3);animation:none"></i>Conectado · sin registros aún';el.style.color='var(--text-3)';}
    else{el.innerHTML='<i></i>Conectando con Google Sheets…';el.style.color='var(--text-2)';}
  });
}
async function cargar(){
  pintarFecha(); setInterval(pintarFecha,30000);
  buildNav();
  if(!NEXUS_API){SYNC_STATE='demo';render();syncFooter();return;}
  SYNC_STATE='cargando'; render(); syncFooter();
  // JSONP: carga vía <script> para evitar el bloqueo CORS de Google
  window.__nexusCB=function(j){
    if(j && (j.empleados && j.empleados.length)){
      aplicarDatos(j); SYNC_STATE='ok';
    }else{
      SYNC_STATE = (j && (j.errorChecador||j.errorVacaciones)) ? 'error' : 'vacio';
    }
    setRole('admin'); syncFooter();
  };
  const s=document.createElement('script');
  s.src=NEXUS_API+(NEXUS_API.indexOf('?')>-1?'&':'?')+'callback=__nexusCB';
  s.onerror=function(){SYNC_STATE='error';setRole('admin');syncFooter();};
  document.body.appendChild(s);
  // timeout de seguridad: si no responde en 12s, marca sin conexión
  setTimeout(function(){if(SYNC_STATE==='cargando'){SYNC_STATE='error';setRole('admin');syncFooter();}},12000);
}
cargar();
